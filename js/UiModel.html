<!doctype html>
<html>
  <head>
    <title>Navbar + Modal</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }

      /* Navbar */
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #222;
        padding: 15px 30px;
        color: white;
      }

      .nav-btn {
        padding: 8px 15px;
        border: none;
        background-color: #00bcd4;
        color: white;
        cursor: pointer;
        border-radius: 5px;
      }

      .nav-btn:hover {
        background-color: #0097a7;
      }

      /* Modal */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
        display: none;
        justify-content: center;
        align-items: center;
      }

      .modal {
        background: white;
        padding: 25px;
        border-radius: 8px;
        width: 300px;
        text-align: center;
      }

      .close-btn {
        margin-top: 10px;
        padding: 7px 15px;
        border: none;
        background-color: crimson;
        color: white;
        cursor: pointer;
        border-radius: 5px;
      }

      .close-btn:hover {
        background-color: darkred;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <div class="navbar">
      <h2>MyWebsite</h2>
      <button class="nav-btn" onclick="openModal()">Open Modal</button>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
      <div class="modal">
        <h3>Welcome 👋</h3>
        <p>This is a simple modal popup using JavaScript.</p>
        <button class="close-btn" onclick="closeModal()">Close</button>
      </div>
    </div>

    <script>
      function openModal() {
        document.getElementById("modal").style.display = "flex";
      }

      function closeModal() {
        document.getElementById("modal").style.display = "none";
      }
    </script>
  </body>
</html>
