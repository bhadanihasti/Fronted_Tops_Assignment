<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Image Slider</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #111;
      }

      .slider {
        width: 400px;
        height: 250px;
        overflow: hidden;
        border-radius: 10px;
      }

      .slider img {
        width: 100%;
        height: 100%;
        display: none;
        object-fit: cover;
      }

      .slider img.active {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="slider">
      <img src="images/domino.jpg" class="active" />
      <img src="images/cocktails.jpg" />
      <img src="images/balaji.jpg" />
    </div>

    <script>
      let images = document.querySelectorAll(".slider img");
      let index = 0;

      setInterval(() => {
        images[index].classList.remove("active");

        index = (index + 1) % images.length;

        images[index].classList.add("active");
      }, 3000); // 3 seconds
    </script>
  </body>
</html>
