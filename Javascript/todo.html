<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      table {
        margin: 20px auto;
        border-collapse: collapse;
        width: 70%;
      }

      table,
      th,
      td {
        border: 1px solid #000;
        padding: 8px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>My To-Do List ✔</h2>

      <div class="inputBox">
        <input type="text" id="taskInput" placeholder="Add a new task..." />
        <input type="text" id="taskDes" placeholder="Add Description" />
        <input type="hidden" name="" id="hiddenId" />
        <button id="addBtn">Add</button>
        <button id="updateBtn" onclick="updateTask()">Update</button>
      </div>

      <div class="result">
        <table>
          <thead>
            <tr>
              <th>Sr No.</th>
              <th>Add Task</th>
              <th>Add Description</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="tasklist"></tbody>
        </table>
      </div>
    </div>

    <script>
      let todo = JSON.parse(localStorage.getItem("tododata")) || [];
      function saveLocal() {
        localStorage.setItem("tododata", JSON.stringify(todo));
      }

      document.getElementById("addBtn").addEventListener("click", () => {
        let taskInput = document.getElementById("taskInput").value;
        let taskDes = document.getElementById("taskDes").value;

        todo.push({
          name: taskInput,
          des: taskDes,
        });
        saveLocal();
        document.getElementById("taskInput").value = "";
        document.getElementById("taskDes").value = "";
        printTodo();
      });

      function printTodo() {
        let str = "";

        todo.forEach((item, i) => {
          str += ` <td>${i + 1}</td>
            <td>${item.name}</td>
            <td>${item.des}</td>
            <td>
              <button onclick="editTask(${i})">Edit</button
              ><button onclick="deleteTask(${i})">Delete</button>
            </td>`;
        });
        document.getElementById("tasklist").innerHTML = str;
      }

      window.onload = printTodo;

      function editTask(id) {
        document.getElementById("taskInput").value = todo[id].name;
        document.getElementById("taskDes").value = todo[id].des;
        document.getElementById("hiddenId").value = id;
      }

      function updateTask() {
        let taskInput = document.getElementById("taskInput").value;
        let taskDes = document.getElementById("taskDes").value;
        let id = document.getElementById("hiddenId").value;
        todo[id] = {
          name: taskInput,
          des: taskDes,
        };

        saveLocal();
        document.getElementById("taskInput").value = "";
        document.getElementById("taskDes").value = "";
        printTodo();
      }

      function deleteTask(id) {
        todo.splice(id, 1);
        saveLocal();
        printTodo();
      }
    </script>
  </body>
</html>
