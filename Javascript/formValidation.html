<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Records</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">

    <h2 class="text-center mt-4">Student Records</h2>

    <div class="container mt-4">

      <table class="table table-striped table-hover text-center">

        <thead class="table-primary">
          <tr>
            <th>SRNO</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Course</th>
            <th>Skills</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="taskList"></tbody>

      </table>

    </div>


<script>

let allFormData = JSON.parse(localStorage.getItem("formDataArray")) || [];

function fetchAndDisplayData(){

let str="";

allFormData.forEach((data,index)=>{

str+=`
<tr>

<td>${index+1}</td>
<td>${data.fullName}</td>
<td>${data.email}</td>
<td>${data.age}</td>
<td>${data.gender}</td>
<td>${data.course}</td>
<td>${data.skill}</td>

<td>

<button onclick="editTask(${index})" class="btn btn-warning btn-sm">Edit</button>

<button onclick="deleteTask(${index})" class="btn btn-danger btn-sm">Delete</button>

</td>

</tr>
`;

});

document.getElementById("taskList").innerHTML=str;

}

document.addEventListener("DOMContentLoaded",fetchAndDisplayData);


function deleteTask(id){

allFormData.splice(id,1);

localStorage.setItem("formDataArray",JSON.stringify(allFormData));

fetchAndDisplayData();

}

function editTask(id){

localStorage.setItem("editIndex",id);

window.location.href="RegForm.html";

}

</script>

  </body>
</html>
